<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Web Portal · Alumni Data Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/design-system.css?v=20260615f" />
  <link rel="stylesheet" href="../assets/app.css?v=20260615f" />
</head>
<body>

<!-- ════════════ LOGIN ════════════ -->
<div id="loginView" class="liff-stage" style="background:radial-gradient(circle at 70% 20%,oklch(0.97 0.02 25),transparent 55%),var(--muted)">
  <div class="ds-card" style="width:400px;max-width:100%">
    <div class="ds-card-content" style="padding:2rem">
      <div class="flex items-center gap-3 mb-4">
        <div style="width:44px;height:44px;border-radius:var(--radius-lg);background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z"/><path d="M22 10v6"/><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"/></svg></div>
        <div>
          <div style="font-weight:700">Alumni Data Platform</div>
          <div class="type-caption">Admin Web Portal</div>
        </div>
      </div>
      <h3 class="type-h4 mb-2">เข้าสู่ระบบผู้ดูแล</h3>
      <p class="type-body-sm muted mb-4">เข้าสู่ระบบด้วยชื่อผู้ใช้และรหัสผ่านที่ปลอดภัย</p>
      <form onsubmit="doLogin(event)">
        <div class="form-group">
          <label class="ds-label">Username</label>
          <input class="ds-input" id="loginUser" value="admin" placeholder="ชื่อผู้ใช้" />
        </div>
        <div class="form-group">
          <label class="ds-label">Password</label>
          <input class="ds-input" id="loginPass" type="password" value="password" placeholder="รหัสผ่าน" />
        </div>
        <label class="ds-checkbox-wrap mb-3" onclick="this.querySelector('.ds-checkbox').classList.toggle('checked')">
          <span class="ds-checkbox checked"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
          <span class="type-body-sm">จดจำการเข้าสู่ระบบ</span>
        </label>
        <button class="btn btn-default btn-lg btn-block" type="submit">เข้าสู่ระบบ</button>
      </form>
      <div class="ds-separator"></div>
      <p class="type-caption text-center">เดโม — กดเข้าสู่ระบบได้ทันที · <a href="../index.html" class="btn-link">กลับหน้าหลัก</a></p>
    </div>
  </div>
</div>

<!-- ════════════ APP SHELL ════════════ -->
<div id="appView" class="admin-layout hidden">
  <!-- Sidebar -->
  <aside class="admin-sidebar" id="sidebar">
    <div class="admin-brand">
      <span class="logo"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z"/><path d="M22 10v6"/><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"/></svg></span>
      <div><h1>Alumni Platform</h1><span>Admin Web Portal</span></div>
    </div>
    <nav class="admin-nav" id="navMenu"></nav>
    <div class="admin-userbox">
      <span class="avatar avatar-md">AD</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:.82rem;font-weight:600">เจ้าหน้าที่ฝ่ายศิษย์เก่า</div>
        <div class="type-caption">admin@alumni.ac.th</div>
      </div>
      <button class="btn btn-ghost btn-icon" title="ออกจากระบบ" onclick="logout()" id="logoutBtn"></button>
    </div>
  </aside>

  <!-- Main -->
  <div class="admin-main">
    <header class="admin-topbar">
      <div class="flex items-center gap-3">
        <button class="btn btn-ghost btn-icon" id="menuBtn" style="display:none" onclick="document.getElementById('sidebar').classList.toggle('open')"></button>
        <h2 id="pageTitle">Dashboard</h2>
      </div>
      <div class="flex items-center gap-2">
        <button class="btn btn-ghost btn-icon" id="bellBtn" title="การแจ้งเตือน"></button>
        <span class="badge badge-success">ระบบออนไลน์</span>
      </div>
    </header>
    <main class="admin-content" id="content"></main>
  </div>
</div>

<!-- Modal / drawer mount -->
<div class="ds-overlay" id="overlay" onclick="if(event.target===this)closeOverlay()"></div>

<script src="../assets/app.js?v=20260615f"></script>
<script>
/* ───────── Navigation ───────── */
const NAV = [
  { group: 'หลัก', items: [
    { id: 'dashboard', label: 'Dashboard', icon: 'chart' },
    { id: 'alumni', label: 'จัดการศิษย์เก่า', icon: 'users' },
    { id: 'payments', label: 'Payment Queue (สมาชิก)', icon: 'card' },
    { id: 'broadcast', label: 'Broadcast Message', icon: 'send' },
  ]},
  { group: 'กิจกรรม & บัตร', items: [
    { id: 'events', label: 'Event Management', icon: 'ticket' },
    { id: 'eventpayments', label: 'Event Payment Queue', icon: 'card' },
    { id: 'checkin', label: 'Check-in Scanner', icon: 'scan' },
  ]},
  { group: 'เนื้อหา', items: [
    { id: 'cms', label: 'จัดการข่าว/กิจกรรม', icon: 'cal' },
    { id: 'sitecontent', label: 'เนื้อหาเว็บไซต์', icon: 'grid' },
  ]},
  { group: 'ระบบ', items: [
    { id: 'permissions', label: 'สิทธิ์ผู้ใช้', icon: 'users' },
    { id: 'settings', label: 'ตั้งค่า', icon: 'settings' },
  ]},
];
const TITLES = { dashboard:'Dashboard', alumni:'จัดการศิษย์เก่า', payments:'Payment Queue — ค่าสมาชิก', eventpayments:'Event Payment Queue — ค่าบัตรงาน', events:'Event Management', checkin:'Check-in Scanner', cms:'จัดการข่าว/กิจกรรม', sitecontent:'เนื้อหาเว็บไซต์', broadcast:'Broadcast Message', permissions:'สิทธิ์ผู้ใช้ (User Permissions)', settings:'ตั้งค่า' };
let current = 'dashboard';

function renderNav() {
  const el = document.getElementById('navMenu');
  el.innerHTML = NAV.map(g => `
    <div class="admin-nav-label">${g.group}</div>
    ${g.items.map(it => `<a class="admin-nav-item ${it.id===current?'active':''}" onclick="go('${it.id}')">${icon(it.icon)} ${it.label}</a>`).join('')}
  `).join('');
}
function go(id) { current = id; document.getElementById('pageTitle').textContent = TITLES[id]; renderNav(); VIEWS[id](); document.getElementById('sidebar').classList.remove('open'); window.scrollTo(0,0); }

function doLogin(e){ e.preventDefault(); document.getElementById('loginView').classList.add('hidden'); document.getElementById('appView').classList.remove('hidden'); go('dashboard'); }
function logout(){ document.getElementById('appView').classList.add('hidden'); document.getElementById('loginView').classList.remove('hidden'); }

function closeOverlay(){ document.getElementById('overlay').classList.remove('open'); document.getElementById('overlay').innerHTML=''; }
function openModal(html){ const o=document.getElementById('overlay'); o.innerHTML=html; o.classList.add('open'); }

/* ───────── DASHBOARD ───────── */
const VIEWS = {};
VIEWS.dashboard = function() {
  const total = ALUMNI.length;
  const members = ALUMNI.filter(a=>a.status==='member').length;
  const teachers = ALUMNI.filter(a=>a.status==='teacher').length;
  const general = ALUMNI.filter(a=>a.status==='alumni').length;
  const linked = ALUMNI.filter(a=>a.linked).length;
  const newThisYear = ALUMNI.filter(a=>String(a.joined||'').startsWith('2569')).length; // เข้าระบบปีนี้
  const recent = ALUMNI.filter(a=>a.linked).slice(-5).reverse();
  const facCounts = FACULTIES.map(f => ({ f, n: ALUMNI.filter(a=>a.faculty===f).length }));
  const maxFac = Math.max(...facCounts.map(x=>x.n));

  document.getElementById('content').innerHTML = `
    <div class="page-head"><h3>ภาพรวมระบบ</h3><p>สรุปข้อมูลศิษย์เก่า / ครู และสถิติการใช้งานล่าสุด</p></div>

    <div class="grid-stats mb-4">
      ${statCard('users','ศิษย์เก่าทั้งหมด', total, '+'+newThisYear+' เข้าระบบปีนี้','up')}
      ${statCard('link','เชื่อมบัญชี LINE แล้ว', linked, Math.round(linked/total*100)+'% ของทั้งหมด','up')}
      <div onclick="go('payments')" style="cursor:pointer">${statCard('card','สลิปค่าสมาชิกรออนุมัติ', PAYMENTS.filter(p=>p.status==='pending').length, 'ตรวจที่ Payment Queue','down')}</div>
      <div onclick="go('eventpayments')" style="cursor:pointer">${statCard('ticket','สลิปค่าบัตรงานรออนุมัติ', EVENT_PAYMENTS.filter(p=>p.status==='pending').length, 'ตรวจที่ Event Payment Queue','down')}</div>
    </div>

    <div class="grid-2 mb-4">
      <div class="ds-card">
        <div class="ds-card-header"><div class="ds-card-title">จำนวนศิษย์เก่าแยกตามคณะ</div><div class="ds-card-desc">กระจายตัวตามคณะที่สำเร็จการศึกษา</div></div>
        <div class="ds-card-content">
          <div class="bars">
            ${facCounts.map((x,i)=>`<div class="bar-col"><div style="font-size:.7rem;color:var(--muted-foreground)">${x.n}</div><div class="bar" data-h="${Math.max(8,x.n/maxFac*100).toFixed(1)}" style="height:0%;background:var(--chart-${(i%5)+1})"></div><div class="bar-x">${x.f.replace('คณะ','').slice(0,6)}</div></div>`).join('')}
          </div>
        </div>
      </div>

      <div class="ds-card">
        <div class="ds-card-header"><div class="ds-card-title">สัดส่วนตามสถานะสมาชิก</div><div class="ds-card-desc">ศิษย์เก่าทั่วไป / สมาชิกสมาคม / ครู</div></div>
        <div class="ds-card-content">
          ${donut([
            {label:'ศิษย์เก่าทั่วไป', v:general, c:'var(--chart-1)'},
            {label:'สมาชิกสมาคม', v:members, c:'var(--chart-3)'},
            {label:'ครู (สมาชิก)', v:teachers, c:'var(--chart-4)'},
          ], total)}
        </div>
      </div>
    </div>

    <div class="ds-card">
      <div class="ds-card-header flex justify-between items-center">
        <div><div class="ds-card-title">ศิษย์เก่าล่าสุดที่เชื่อมบัญชี LINE</div><div class="ds-card-desc">5 รายการล่าสุด</div></div>
        <button class="btn btn-outline btn-sm" onclick="go('alumni')">ดูทั้งหมด</button>
      </div>
      <div class="ds-card-content" style="padding-top:.5rem">
        <div class="ds-table-wrap" style="border:none">
          <table class="ds-table">
            <thead><tr><th>ชื่อ - สกุล</th><th>คณะ</th><th>รุ่น (พ.ศ.)</th><th>สถานะ</th><th>เชื่อมเมื่อ</th></tr></thead>
            <tbody>
              ${recent.map(a=>`<tr>
                <td><div class="flex items-center gap-2">${avatarOf(a,'md')}<span>${a.first} ${a.last}</span></div></td>
                <td>${a.faculty}</td><td>${a.year}</td>
                <td><span class="badge ${STATUS_BADGE[a.status]}">${STATUS_LABEL[a.status]}</span></td>
                <td class="muted">${a.joined}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
  animateCharts(document.getElementById('content'));
};

function statCard(ic, label, value, delta, dir){
  return `<div class="stat-card">
    <div class="stat-top"><span class="stat-label">${label}</span><span class="stat-icon">${icon(ic)}</span></div>
    <div class="stat-value" data-count="${value}">0</div>
    <div class="stat-delta ${dir}">${icon(dir==='up'?'trendUp':'trendDown',13)} ${delta}</div>
  </div>`;
}
function donut(parts, total){
  let acc=0; const segs = parts.map(p=>{ const start=acc/total*360; acc+=p.v; const end=acc/total*360; return `${p.c} ${start}deg ${end}deg`; }).join(',');
  return `<div class="flex items-center gap-4 wrap">
    <div class="donut-anim" style="width:150px;height:150px;border-radius:50%;background:conic-gradient(${segs});position:relative;flex-shrink:0">
      <div style="position:absolute;inset:26px;background:var(--card);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center">
        <div style="font-size:1.5rem;font-weight:700" data-count="${total}">0</div><div class="type-caption">คน</div>
      </div>
    </div>
    <div style="flex:1;min-width:140px">
      ${parts.map(p=>`<div class="legend-row"><span class="legend-dot" style="background:${p.c}"></span><span class="grow">${p.label}</span><strong>${p.v}</strong></div>`).join('')}
    </div>
  </div>`;
}

/* ───────── ALUMNI MANAGEMENT ───────── */
let alumniFilter = { q:'', faculty:'', status:'', life:'', onlyDup:false };
/* Possible Duplicate Detection — Flag อัตโนมัติเมื่อ ชื่อ + รุ่น + คณะ ตรงกับ record อื่น */
function dupKey(a){ return [(a.first||'').trim(), (a.last||'').trim(), String(a.year||'').trim(), (a.faculty||'').trim()].join('|'); }
function buildDupCounts(){ const m={}; ALUMNI.forEach(a=>{ const k=dupKey(a); m[k]=(m[k]||0)+1; }); return m; }
function isPossibleDup(a, counts){ return (counts||window._dupCounts||{})[dupKey(a)] > 1; }
let alumniPage = 1, alumniLastSig = '', ALUMNI_PER_PAGE = 8;
function goAlumniPage(p){ alumniPage = p; renderAlumniTable(); window.scrollTo(0,0); }
VIEWS.alumni = function(){
  document.getElementById('content').innerHTML = `
    <div class="page-head flex justify-between items-center wrap gap-3">
      <div><h3>จัดการข้อมูลศิษย์เก่า / ครู</h3><p>เพิ่ม นำเข้า ค้นหา แก้ไข ลบ (Soft Delete) และรวมโปรไฟล์ (Merge) · การอนุมัติสมาชิกอยู่ที่ Payment Queue</p></div>
      <div class="flex gap-2">
        <button class="btn btn-outline btn-md" onclick="openImport()">${icon('upload',16)} นำเข้าไฟล์</button>
        <button class="btn btn-default btn-md" onclick="openAlumniForm()">${icon('plus',16)} เพิ่มศิษย์เก่า</button>
      </div>
    </div>

    <div class="ds-card">
      <div class="ds-card-content">
        <div class="filter-bar">
          <div class="search-box">${icon('search',16)}<input class="ds-input" id="fq" placeholder="ค้นหาชื่อ, อีเมล, รหัส..." oninput="alumniFilter.q=this.value;renderAlumniTable()"></div>
          <select class="ds-select" style="width:auto" onchange="alumniFilter.faculty=this.value;renderAlumniTable()">
            <option value="">ทุกคณะ</option>${FACULTIES.map(f=>`<option>${f}</option>`).join('')}
          </select>
          <select class="ds-select" style="width:auto" onchange="alumniFilter.status=this.value;renderAlumniTable()">
            <option value="">ทุกสถานะ</option><option value="alumni">ศิษย์เก่าทั่วไป</option><option value="member">สมาชิกสมาคม</option><option value="teacher">ครู (สมาชิก)</option>
          </select>
          <select class="ds-select" style="width:auto" onchange="alumniFilter.life=this.value;renderAlumniTable()">
            <option value="">สถานะการมีชีวิต</option><option value="alive">มีชีวิต</option><option value="deceased">เสียชีวิต</option>
          </select>
          <label class="flex items-center gap-2" style="cursor:pointer;white-space:nowrap"><span class="ds-switch ${alumniFilter.onlyDup?'on':''}" id="fOnlyDup" onclick="alumniFilter.onlyDup=!alumniFilter.onlyDup;this.classList.toggle('on',alumniFilter.onlyDup);renderAlumniTable()"></span><span class="type-body-sm">เฉพาะที่อาจซ้ำ</span></label>
        </div>
        <div id="alumniTableWrap"></div>
      </div>
    </div>`;
  renderAlumniTable();
};

function filteredAlumni(){
  const f = alumniFilter;
  const counts = window._dupCounts || {};
  return ALUMNI.filter(a=>{
    if(f.q){ const s=(a.first+a.last+a.email+a.id+a.company).toLowerCase(); if(!s.includes(f.q.toLowerCase())) return false; }
    if(f.faculty && a.faculty!==f.faculty) return false;
    if(f.status && a.status!==f.status) return false;
    if(f.life && a.life!==f.life) return false;
    if(f.onlyDup && !(counts[dupKey(a)] > 1)) return false;
    return true;
  });
}
function renderAlumniTable(){
  window._dupCounts = buildDupCounts();
  const rows = filteredAlumni();
  const dupTotal = ALUMNI.filter(a=>isPossibleDup(a)).length;
  const sig = JSON.stringify(alumniFilter);
  if(sig !== alumniLastSig){ alumniPage = 1; alumniLastSig = sig; }
  const totalPages = Math.max(1, Math.ceil(rows.length / ALUMNI_PER_PAGE));
  if(alumniPage > totalPages) alumniPage = totalPages;
  const start = (alumniPage-1) * ALUMNI_PER_PAGE;
  const pageRows = rows.slice(start, start + ALUMNI_PER_PAGE);
  document.getElementById('alumniTableWrap').innerHTML = `
    <div class="flex justify-between items-center mb-2 wrap gap-2"><span class="type-body-sm muted">พบ ${rows.length} รายการ${rows.length>ALUMNI_PER_PAGE?` · แสดง ${start+1}–${Math.min(start+ALUMNI_PER_PAGE,rows.length)}`:''}</span>${dupTotal?`<span class="badge badge-warning">${icon('bell',12)} อาจซ้ำ ${dupTotal} รายการ</span>`:''}</div>
    <div class="ds-table-wrap">
      <table class="ds-table">
        <thead><tr><th>ศิษย์เก่า / ครู</th><th>คณะ / สาขา</th><th>รุ่น</th><th>บริษัท</th><th>สถานะ</th><th>LINE</th><th></th></tr></thead>
        <tbody>
          ${rows.length===0 ? `<tr><td colspan="7" class="text-center muted" style="padding:2rem">ไม่พบข้อมูลตามเงื่อนไข</td></tr>` :
          pageRows.map(a=>`<tr>
            <td><div class="flex items-center gap-2">
              ${avatarOf(a,'md')}
              <div><div style="font-weight:500">${a.first} ${a.last} ${a.life==='deceased'?'<span class="badge badge-ghost">เสียชีวิต</span>':''} ${isPossibleDup(a)?`<span class="badge badge-warning" title="ชื่อ-สกุล / รุ่น / คณะ ตรงกับรายการอื่น">${icon('bell',12)} อาจซ้ำ</span>`:''}</div><div class="type-caption">${a.id} · ${a.email}</div></div>
            </div></td>
            <td>${a.faculty}<div class="type-caption">${a.major}</div></td>
            <td>${a.year}</td>
            <td>${a.company}<div class="type-caption">${a.position}</div></td>
            <td><span class="badge ${STATUS_BADGE[a.status]}">${STATUS_LABEL[a.status]}</span></td>
            <td>${a.linked?'<span class="badge badge-success">เชื่อมแล้ว</span>':'<span class="badge badge-ghost">ยังไม่เชื่อม</span>'}</td>
            <td><div class="flex gap-1">
              <button class="btn btn-ghost btn-icon" title="ดูโปรไฟล์" onclick="openProfile('${a.id}')">${icon('search',15)}</button>
              <button class="btn btn-ghost btn-icon" title="แก้ไข" onclick="openAlumniForm('${a.id}')">${icon('edit',15)}</button>
              <button class="btn btn-ghost btn-icon" title="ลบ" onclick="confirmDelete('${a.id}')">${icon('trash',15)}</button>
            </div></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
    ${totalPages>1?`<div class="flex items-center justify-between mt-3 wrap gap-2">
      <span class="type-caption">หน้า ${alumniPage} / ${totalPages}</span>
      <div class="flex gap-1">
        <button class="btn btn-outline btn-sm" ${alumniPage<=1?'disabled':''} onclick="goAlumniPage(${alumniPage-1})">${icon('back',14)} ก่อนหน้า</button>
        ${Array.from({length:totalPages},(_,i)=>i+1).map(p=>`<button class="btn ${p===alumniPage?'btn-default':'btn-outline'} btn-sm" style="min-width:32px" onclick="goAlumniPage(${p})">${p}</button>`).join('')}
        <button class="btn btn-outline btn-sm" ${alumniPage>=totalPages?'disabled':''} onclick="goAlumniPage(${alumniPage+1})">ถัดไป <span style="display:inline-block;transform:rotate(180deg)">${icon('back',14)}</span></button>
      </div>
    </div>`:''}`;
}

function openProfile(id){
  const a = ALUMNI.find(x=>x.id===id);
  openModal(`<div class="ds-modal">
    <div class="ds-modal-header"><span class="ds-modal-title">โปรไฟล์ศิษย์เก่า</span><button class="btn btn-ghost btn-icon" onclick="closeOverlay()">${icon('x',18)}</button></div>
    <div class="ds-modal-body">
      <div class="flex items-center gap-3 mb-4">
        ${avatarOf(a,'2xl')}
        <div><div class="type-h4">${a.first} ${a.last}</div>

/* ── Merge โปรไฟล์ — ล็อกคู่ที่จะรวมชัดเจน + เลือกโปรไฟล์หลักก่อนยืนยัน ── */
const MERGE_FIELDS = [['first','ชื่อ'],['last','นามสกุล'],['faculty','คณะ'],['major','สาขา'],['year','รุ่น (พ.ศ.)'],['phone','เบอร์โทร'],['email','อีเมล'],['company','บริษัท'],['position','ตำแหน่ง'],['status','สถานะสมาชิก'],['life','การมีชีวิต']];
function mBlank(v){ return v==null || v==='' || v==='-' || v==='—'; }
function mergedRecord(primary, other){
  const out = Object.assign({}, primary);
  MERGE_FIELDS.forEach(([k])=>{ if(mBlank(out[k]) && !mBlank(other[k])) out[k] = other[k]; });
  return out;
}
function mLabel(k,v){ if(k==='status') return STATUS_LABEL[v]||v; if(k==='life') return LIFE_LABEL[v]||v; return v==null?'—':v; }
/* ขั้นที่ 1: เลือกโปรไฟล์อีกใบที่จะรวมกับโปรไฟล์ที่เลือก */
function openMerge(id){

  // ล็อก: รวมได้เฉพาะโปรไฟล์ที่ "ซ้ำจริง" — ชื่อ+สกุล+รุ่น+คณะ ตรงกันทั้งหมด (กันรวมผิดคน)
  const dups = ALUMNI.filter(x=>x.id!==id && dupKey(x)===dupKey(a));

  // มีตัวซ้ำจริงหลายรายการ → ให้เลือกเฉพาะในกลุ่มที่ซ้ำจริงเท่านั้น
  openModal(`<div class="ds-modal" style="max-width:520px">

/* ขั้นที่ 2: ล็อกคู่ A+B แสดงชัดเจน + เลือกโปรไฟล์หลัก + พรีวิวผลลัพธ์ ก่อนยืนยัน */
let mergePair = { a:null, b:null };
function mUpd(rec){ return rec && rec.updated ? rec.updated : ''; }            // วันอัปเดต (sortable 'พ.ศ.-MM-DD')
function mFmtDate(s){ if(!s) return '—'; const p=String(s).split('-'); return p.length===3 ? (p[2]+'/'+p[1]+'/'+p[0]) : s; }
function openMergeConfirm(idA, idB){
  mergePair = { a:idA, b:idB };
  const A = ALUMNI.find(x=>x.id===idA), B = ALUMNI.find(x=>x.id===idB);
  // ค่าเริ่มต้น: เลือกใบที่ "อัปเดตล่าสุด" เป็นโปรไฟล์หลักให้อัตโนมัติ
  const startId = (A && B && mUpd(B) > mUpd(A)) ? idB : idA;
  renderMergeConfirm(startId);
}
function renderMergeConfirm(primaryId){
  const A = ALUMNI.find(x=>x.id===mergePair.a), B = ALUMNI.find(x=>x.id===mergePair.b);

  const diffCount = MERGE_FIELDS.filter(([k])=>!mBlank(A[k])&&!mBlank(B[k])&&String(A[k])!==String(B[k])).length;
  // ใบที่อัปเดตล่าสุด (null ถ้าวันเท่ากัน/ไม่มีข้อมูล)
  const newerId = mUpd(A)===mUpd(B) ? null : (mUpd(A) > mUpd(B) ? A.id : B.id);
  // ส่วนหัวคอลัมน์ของแต่ละโปรไฟล์ (เลือกเป็นโปรไฟล์หลักได้)
  const colHead = (rec) => { const isP = rec.id===primary.id; const isNew = rec.id===newerId; return `<th style="text-align:left;vertical-align:top;min-width:160px;background:${isP?'oklch(0.6 0.18 145 / 0.08)':'transparent'}">

    </label></th>`; };
  // เซลล์ค่าของแต่ละช่อง — ไฮไลต์ค่าที่จะเก็บ (✓), ค่าที่ถูกทิ้งขีดฆ่า
  const rowFor = ([k,label]) => {
    const differ = !mBlank(A[k]) && !mBlank(B[k]) && String(A[k])!==String(B[k]);
    const keptId = !mBlank(primary[k]) ? primary.id : (!mBlank(other[k]) ? other.id : null);
    const cell = (rec) => {
      const blank = mBlank(rec[k]); const kept = keptId===rec.id;
      if(blank) return `<td style="vertical-align:top"><span class="muted">—</span></td>`;
      const val = escHtml(String(mLabel(k, rec[k])));
      const style = kept ? 'font-weight:600;color:var(--foreground)' : 'color:var(--muted-foreground)'+(differ?';text-decoration:line-through':'');
      return `<td style="vertical-align:top"><span style="${style}">${val}</span>${kept?' <span style="color:oklch(0.5 0.18 145);display:inline-flex;vertical-align:middle" title="ค่าที่จะเก็บ">'+icon('check',13)+'</span>':''}</td>`;
    };
    return `<tr style="${differ?'background:oklch(0.86 0.13 85 / 0.13)':''}"><td class="type-caption" style="vertical-align:top;white-space:nowrap">${label}${differ?' <span class="badge badge-warning" style="font-size:.58rem;padding:0 .3rem">ต่าง</span>':''}</td>${cell(A)}${cell(B)}</tr>`;
  };
  openModal(`<div class="ds-modal" style="max-width:680px">
    <div class="ds-modal-header"><span class="ds-modal-title">เปรียบเทียบ & ยืนยันการรวมโปรไฟล์</span><button class="btn btn-ghost btn-icon" onclick="closeOverlay()">${icon('x',18)}</button></div>
    <div class="ds-modal-body">
      <div class="ds-alert ds-alert-warning"><span class="ds-alert-icon">${icon('bell',16)}</span><div>เลือก<strong>โปรไฟล์หลัก</strong>ที่จะเก็บไว้ (คลิกวงกลมบนหัวคอลัมน์) — อีกใบจะถูก<strong>ลบถาวร</strong> · พบข้อมูลที่ต่างกัน <strong>${diffCount}</strong> ช่อง${newerId?' · ระบบเลือก<strong>ใบที่อัปเดตล่าสุด</strong> ('+newerId+') เป็นหลักให้แล้ว':''}</div></div>
      <div class="flex gap-3 items-center mt-2 mb-2" style="flex-wrap:wrap">

        <span class="type-caption" style="display:inline-flex;align-items:center;gap:.25rem"><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:oklch(0.86 0.13 85 / 0.4)"></span> แถวที่ข้อมูลต่างกัน</span>
        <span class="type-caption"><s>ขีดฆ่า</s> = ค่าที่จะถูกทิ้ง</span>
      </div>
      <div class="ds-table-wrap"><table class="ds-table" style="font-size:.82rem">
        <thead><tr><th style="min-width:80px">ข้อมูล</th>${colHead(A)}${colHead(B)}</tr></thead>
        <tbody>${MERGE_FIELDS.map(rowFor).join('')}</tbody>
      </table></div>
      <p class="type-caption muted mt-2">กติกา: เก็บค่าจาก<strong>โปรไฟล์หลัก</strong>เป็นหลัก · ช่องที่หลักว่าง จะเติมจากอีกใบให้อัตโนมัติ</p>
    </div>
    <div class="ds-modal-footer">
      <button class="btn btn-secondary btn-md" onclick="openMerge('${primary.id}')">${icon('back',16)} เลือกใหม่</button>
      <button class="btn btn-default btn-md" onclick="doMerge('${primary.id}','${other.id}')">${icon('link',16)} ยืนยัน — เก็บ ${primary.id} · ลบ ${other.id}</button>
    </div>
  </div>`);
}
function nowBE(){ const d=new Date(); return (d.getFullYear()+543)+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function doMerge(keepId, mergeId){
  const keep = ALUMNI.find(x=>x.id===keepId), merge = ALUMNI.find(x=>x.id===mergeId);
  if(!keep || !merge){ toast('ไม่พบโปรไฟล์','error'); return; }
  const m = mergedRecord(keep, merge); MERGE_FIELDS.forEach(([k])=>{ keep[k] = m[k]; });
  if(merge.linked) keep.linked = true; // คงสถานะเชื่อม LINE ถ้ามีใบใดเชื่อมอยู่
  keep.updated = nowBE(); // เพิ่งรวมข้อมูล = อัปเดตล่าสุดวันนี้
  const i = ALUMNI.findIndex(x=>x.id===mergeId); if(i>-1) ALUMNI.splice(i,1);
  logAction('Merge โปรไฟล์', mergeId+' → '+keepId+' (เก็บ '+keepId+' · ลบ '+mergeId+')');
  closeOverlay(); renderAlumniTable(); toast('รวมโปรไฟล์แล้ว · เก็บ '+keepId+' · ลบ '+mergeId,'success');
}

/* ── Duplicate detection helpers ── */
function readAlumniForm(){
  const g = id => document.getElementById(id)?.value.trim() || '';
  return { first:g('afFirst'), last:g('afLast'), phone:g('afPhone'), email:g('afEmail'),
    faculty:g('afFaculty'), year:g('afYear'), company:g('afCompany'), position:g('afPosition'),
    status:g('afStatus'), life:g('afLife') };
}
// คืนรายการที่อาจซ้ำ (ไม่นับตัวเอง selfId) พร้อมเหตุผล
function findDuplicates(rec, selfId){
  const norm = s => (s||'').toLowerCase().replace(/[\s-]/g,'');
  return ALUMNI.filter(a=>a.id!==selfId).map(a=>{
    const reasons=[];
    if(rec.email && norm(a.email)===norm(rec.email)) reasons.push('อีเมลตรงกัน');
    if(rec.phone && norm(a.phone)===norm(rec.phone)) reasons.push('เบอร์โทรตรงกัน');
    if(rec.first && rec.last && a.first===rec.first && a.last===rec.last && String(a.year)===String(rec.year)) reasons.push('ชื่อ-สกุล & รุ่นตรงกัน');
    return reasons.length?{a,reasons}:null;
  }).filter(Boolean);
}
function checkDupLive(){
  const box = document.getElementById('afDupWarn'); if(!box) return;
  const dups = findDuplicates(readAlumniForm(), window._afEditId||null);
  box.innerHTML = dups.length ? `<div class="ds-alert ds-alert-warning"><span class="ds-alert-icon">${icon('bell',16)}</span><div><strong>พบข้อมูลที่อาจซ้ำ ${dups.length} รายการ</strong>${dups.slice(0,3).map(d=>`${d.a.first} ${d.a.last} (${d.a.id}) — ${d.reasons.join(', ')}`).join('<br>')}</div></div>` : '';
}
function saveAlumni(id){
  window._afEditId = id || null;
  const rec = readAlumniForm();
  if(!rec.first || !rec.last){ toast('กรุณากรอกชื่อ-นามสกุล','error'); return; }
  if(id){ // แก้ไข
    const a = ALUMNI.find(x=>x.id===id); Object.assign(a, rec, { year: rec.year, updated: nowBE() });
    closeOverlay(); renderAlumniTable(); toast('บันทึกการแก้ไขเรียบร้อย','success'); return;
  }
  const dups = findDuplicates(rec, null);
  if(dups.length){ openDupResolve(rec, dups); return; }
  addAlumniRecord(rec);
  closeOverlay(); renderAlumniTable(); toast('เพิ่มศิษย์เก่าใหม่เรียบร้อย','success');
}
function addAlumniRecord(rec){
  const n = ALUMNI.length;

          <div class="grid-2" style="gap:0 1rem">

            <div class="form-group"><label class="ds-label">วันที่</label><input class="ds-input" id="nfDate" value="${n?n.date:todayTH()}" oninput="updateNewsPreview()"></div>
          </div>
          <div class="form-group"><label class="ds-label">สรุปสั้น</label><input class="ds-input" id="nfSummary" value="${n?n.summary.replace(/"/g,'&quot;'):''}" oninput="updateNewsPreview()"></div>
          <div class="form-group"><label class="ds-label">เนื้อหาเต็ม (เว้นบรรทัดเพื่อแยกย่อหน้า)</label><textarea class="ds-textarea" id="nfBody" rows="4" oninput="updateNewsPreview()">${n?n.body.join('\n'):''}</textarea></div>
          <div class="flex items-center justify-between mb-3"><div><div style="font-weight:500;font-size:.875rem">ส่งถึงสมาชิกผ่าน LINE (Broadcast)</div><div class="type-caption">แสดงในฟีด "ข่าวสารที่ได้รับ" ของ LIFF</div></div><span class="ds-switch ${n&&n.broadcast?'on':''}" id="nfBroadcast" data-toggle></span></div>

          <div class="flex items-center justify-between mb-2"><div><div style="font-weight:500;font-size:.875rem">เป็นกิจกรรม (มีวันเวลา/สถานที่)</div><div class="type-caption">เปิดเพื่อกรอกวันเวลา/สถานที่</div></div><span class="ds-switch ${n&&n.isEvent?'on':''}" id="nfEvent" data-toggle></span></div>

              <div class="form-group"><label class="ds-label">เวลา</label><input class="ds-input" id="nfTime" value="${n&&n.time&&n.time!=='—'?n.time:''}" placeholder="เช่น 17:00 – 21:00 น." oninput="updateNewsPreview()"></div>
              <div class="form-group"><label class="ds-label">ค่าใช้จ่าย</label><input class="ds-input" id="nfFee" value="${n&&n.fee&&n.fee!=='—'?n.fee:''}" placeholder="เช่น ไม่มีค่าใช้จ่าย"></div>

    </div>
  </div>`);
  const ev = document.getElementById('nfEvent');
  ev.addEventListener('toggled', e=>{ document.getElementById('nfEventFields').classList.toggle('hidden', !e.detail.on); updateNewsPreview(); });
  document.getElementById('nfBroadcast').addEventListener('toggled', updateNewsPreview);
  bindToggles(document.getElementById('overlay'));
  updateNewsPreview();
}

/* พรีวิวสด — แสดงการ์ดข่าวอย่างที่จะปรากฏบนเว็บ + จุดที่แสดงผล */
function updateNewsPreview(){
  const g = id => document.getElementById(id);
  if(!g('nfPreview')) return;
  const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const title = esc(g('nfTitle').value.trim()) || '<span class="muted">หัวข้อข่าว/กิจกรรม</span>';
  const cat = g('nfCat').value;
  const date = esc(g('nfDate').value.trim()) || todayTH();
  const bodyFirst = g('nfBody').value.split('\n').map(s=>s.trim()).filter(Boolean)[0] || '';
  const summary = esc(g('nfSummary').value.trim() || bodyFirst) || '<span class="muted">สรุปย่อของข่าว/กิจกรรมจะแสดงที่นี่</span>';
  const img = g('nfImg').value;
  const isEvent = g('nfEvent').classList.contains('on');
  const broadcast = g('nfBroadcast').classList.contains('on');
  const place = esc(g('nfPlace')?.value.trim()||''), time = esc(g('nfTime')?.value.trim()||'');
  g('nfPreview').innerHTML = `
    <div class="ds-card ds-card-sm" style="overflow:hidden">
      <div style="height:140px;background:var(--muted) center/cover no-repeat;background-image:url('${IMG(img)}')"></div>
      <div class="ds-card-content">
        <div class="flex justify-between items-center mb-2"><span class="badge ${catBadge(cat)}">${cat}</span><span class="type-caption">${date}</span></div>
        <div class="type-h5" style="line-height:1.35">${title}</div>
        <p class="type-body-sm muted mt-1">${summary}</p>
        ${isEvent&&(place||time)?`<div class="type-caption mt-2">${time?icon('clock',12)+' '+time+'  ':''}${place?icon('pin',12)+' '+place:''}</div>`:''}
        <div class="mt-2"><span class="btn-link type-body-sm">อ่านต่อ →</span></div>
      </div>
    </div>
    <div class="ds-card ds-card-sm mt-3"><div class="ds-card-content" style="padding:.85rem 1rem">
      <div class="type-caption mb-2">จะแสดงผลที่</div>
      <div class="flex items-center gap-2 mb-1" style="color:oklch(0.5 0.18 145)">${icon('check',15)}<span class="type-body-sm" style="color:var(--foreground)">เว็บไซต์สาธารณะ — หน้าข่าว/กิจกรรม</span></div>
      <div class="flex items-center gap-2" style="${broadcast?'color:oklch(0.5 0.18 145)':'color:var(--muted-foreground)'}">${broadcast?icon('check',15):icon('x',15)}<span class="type-body-sm" style="${broadcast?'color:var(--foreground)':''}">ฟีด "ข่าวสารที่ได้รับ" ใน LINE LIFF${broadcast?'':' (เปิด Broadcast เพื่อแสดง)'}</span></div>
      ${isEvent?`<div class="flex items-center gap-2 mt-1" style="color:oklch(0.5 0.18 145)">${icon('check',15)}<span class="type-body-sm" style="color:var(--foreground)">แท็บ "กิจกรรม" ใน LIFF</span></div>`:''}
    </div></div>`;
}

function saveNewsItem(id){
  const v = sel => document.getElementById(sel);
  const title = v('nfTitle').value.trim();
  if(!title){ toast('กรุณากรอกหัวข้อ','error'); return; }
  const isEvent = v('nfEvent').classList.contains('on');
  const broadcast = v('nfBroadcast').classList.contains('on');
  const body = v('nfBody').value.split('\n').map(s=>s.trim()).filter(Boolean);
  let img = v('nfImg').value; if(/^\d+$/.test(img)) img = parseInt(img); // เก็บ seed เป็นตัวเลข, URL/dataURL เป็น string
  const data = {
    cat: v('nfCat').value, date: v('nfDate').value || todayTH(),
    title, summary: v('nfSummary').value.trim() || (body[0]||'').slice(0,90),
    body: body.length?body:[v('nfSummary').value.trim()||title],
    img, isEvent, broadcast,
    place: isEvent?(v('nfPlace').value||'—'):'—', time: isEvent?(v('nfTime').value||'—'):'—', fee: isEvent?(v('nfFee').value||'—'):'—',
    organizer: 'สมาคมศิษย์เก่า',
    dateShort: (v('nfDate').value||todayTH()).split(' ').slice(0,2),
    agenda: null,
  };
  if(id){ const n = NEWS_ITEMS.find(x=>x.id===id); Object.assign(n, data); }
  else { data.id = 'n' + (Date.now()); NEWS_ITEMS.unshift(data); }
  if(!saveNews()){ toast('รูปอาจใหญ่เกินไปสำหรับพื้นที่จัดเก็บ ลองใช้ลิงก์รูปแทน','error'); }
  closeOverlay();
  VIEWS.cms();
  toast(id?'บันทึกการแก้ไขแล้ว · อัปเดตเว็บ & LIFF':'เพิ่มเนื้อหาแล้ว · แสดงบนเว็บ & LIFF','success');
}
/* ── อัปโหลด/เลือกรูปข่าว ── */
function onNewsImgFile(input){
  const f = input.files && input.files[0]; if(!f) return;
  if(f.size > 1.5*1024*1024){ toast('ไฟล์ใหญ่เกิน 1.5MB กรุณาเลือกรูปเล็กลง หรือใช้ลิงก์รูป','error'); return; }
  const r = new FileReader();
  r.onload = e => setNewsImg(e.target.result);
  r.readAsDataURL(f);
}
function setNewsImg(val){
  const hid = document.getElementById('nfImg'); if(hid) hid.value = val;
  const pv = document.getElementById('nfImgPreview'); if(pv) pv.style.backgroundImage = `url('${IMG(val)}')`;
  updateNewsPreview();
}
/* ── ตัวอัปโหลดรูปมาตรฐาน (หน้าตาเดียวกันทุกที่: ตัวอย่างรูป + อัปโหลด + รูปตัวอย่าง + วางลิงก์) ──
   prefix สร้าง id: <prefix>Img (hidden), <prefix>ImgPreview, <prefix>ImgFile, <prefix>ImgUrl */
const _imgCb = {};
function imgUploader(prefix, defImg, label){
  const has = defImg!=='' && defImg!=null && defImg!==undefined;
  const hiddenVal = (typeof defImg==='string') ? String(defImg).replace(/"/g,'&quot;') : (has?defImg:'');
  const sample = (typeof defImg==='number') ? defImg : 1010;
  return `<div class="form-group">
    <label class="ds-label">${label||'รูปภาพ'}</label>
    <div class="flex gap-3 items-center wrap">
      <div id="${prefix}ImgPreview" style="width:140px;height:90px;border-radius:var(--radius-md);border:1px solid var(--border);background:var(--muted) center/cover no-repeat;${has?`background-image:url('${IMG(defImg)}')`:''}"></div>
      <div style="flex:1;min-width:160px">
        <input type="file" accept="image/*" id="${prefix}ImgFile" style="display:none" onchange="onImgFile(this,'${prefix}')">
        <button type="button" class="btn btn-outline btn-sm" onclick="document.getElementById('${prefix}ImgFile').click()">${icon('upload',14)} อัปโหลดรูป</button>
        <button type="button" class="btn btn-ghost btn-sm" onclick="setImg('${prefix}',${sample})" title="ใช้รูปตัวอย่าง">รูปตัวอย่าง</button>
        <input class="ds-input ds-input-sm mt-2" id="${prefix}ImgUrl" placeholder="หรือวางลิงก์รูป https://..." oninput="if(this.value)setImg('${prefix}',this.value)">
        <div class="ds-helper mt-1">รองรับไฟล์ภาพ (.jpg .png) ขนาดเล็ก หรือวางลิงก์รูป</div>
      </div>
    </div>
    <input type="hidden" id="${prefix}Img" value="${hiddenVal}">
  </div>`;
}
function onImgFile(input, prefix){
  const f = input.files && input.files[0]; if(!f) return;
  if(f.size > 1.5*1024*1024){ toast('ไฟล์ใหญ่เกิน 1.5MB กรุณาเลือกรูปเล็กลง หรือใช้ลิงก์รูป','error'); return; }
  const r = new FileReader(); r.onload = e => setImg(prefix, e.target.result); r.readAsDataURL(f);
}
function setImg(prefix, val){
  const hid = document.getElementById(prefix+'Img'); if(hid) hid.value = val;
  const pv = document.getElementById(prefix+'ImgPreview'); if(pv) pv.style.backgroundImage = val?`url('${IMG(val)}')`:'none';
  if(_imgCb[prefix]) _imgCb[prefix]();
}
function deleteNewsItem(id){
  const n = NEWS_ITEMS.find(x=>x.id===id);
  openModal(`<div class="ds-modal" style="max-width:420px">
    <div class="ds-modal-body text-center" style="padding-top:2rem">
      <div class="stat-icon" style="margin:0 auto 1rem;background:oklch(0.577 0.245 27 / 0.12);color:var(--destructive);width:48px;height:48px">${icon('trash',22)}</div>
      <h3 class="type-h4 mb-2">ลบเนื้อหานี้?</h3>
      <p class="type-body-sm muted">“${n.title}” จะถูกนำออกจากเว็บไซต์และฟีด LIFF</p>
    </div>
    <div class="ds-modal-footer" style="justify-content:center">
      <button class="btn btn-secondary btn-md" onclick="closeOverlay()">ยกเลิก</button>
      <button class="btn btn-destructive btn-md" onclick="(function(){const i=NEWS_ITEMS.findIndex(x=>x.id==='${id}');if(i>-1)NEWS_ITEMS.splice(i,1);saveNews();closeOverlay();VIEWS.cms();toast('ลบเนื้อหาแล้ว','error');})()">ลบ</button>
    </div>
  </div>`);
}

function saveHero(){ SITE.hero={ title:document.getElementById('scHeroTitle').value, subtitle:document.getElementById('scHeroSub').value, image:imgVal(document.getElementById('scHeroImg').value) }; saveSite(); toast('บันทึกแบนเนอร์แล้ว · อัปเดตเว็บ','success'); }
function savePresident(){ SITE.president={ name:document.getElementById('scPresName').value, role:document.getElementById('scPresRole').value, photo:imgVal(document.getElementById('scPresPhoto').value), message:document.getElementById('scPresMsg').value }; saveSite(); toast('บันทึกสารนายกสมาคมแล้ว','success'); }
function imgVal(v){ return /^\d+$/.test(v)?parseInt(v):v; }
/* ── เลือกบุคคลจากฐานข้อมูลศิษย์เก่า (สำหรับนายกสมาคม / ศิษย์เก่าดีเด่น) ── */
function alumniOptions(){ return ALUMNI.filter(a=>a.life!=='deceased').map(a=>`<option value="${a.id}">${escHtml(a.first+' '+a.last)} · ${escHtml(a.faculty)} · รุ่น ${a.year}</option>`).join(''); }
function pickPerson(id, prefix){
  if(!id) return; const a = ALUMNI.find(x=>x.id===id); if(!a) return;
  const n=document.getElementById(prefix+'Name'); if(n) n.value=a.first+' '+a.last;
  const ph=document.getElementById(prefix+'Photo'); if(ph) ph.value=a.photo;
  const av=document.getElementById(prefix+'Avatar'); if(av){ const im=av.querySelector('img'); if(im) im.src=face(a.photo); }
}
function onFaceFile(input, prefix){
  const f=input.files&&input.files[0]; if(!f) return;
  if(f.size>1.5*1024*1024){ toast('ไฟล์ใหญ่เกิน 1.5MB','error'); return; }
  const r=new FileReader(); r.onload=e=>{ const ph=document.getElementById(prefix+'Photo'); if(ph) ph.value=e.target.result; const av=document.getElementById(prefix+'Avatar'); if(av){ const im=av.querySelector('img'); if(im) im.src=e.target.result; } }; r.readAsDataURL(f);
}
function onPlainFile(input, targetId){
  const f=input.files&&input.files[0]; if(!f) return;
  if(f.size>1.5*1024*1024){ toast('ไฟล์ใหญ่เกิน 1.5MB','error'); return; }
  const r=new FileReader(); r.onload=e=>{ const t=document.getElementById(targetId); if(t) t.value=e.target.result; }; r.readAsDataURL(f);
}
function removeSiteItem(key,id){ SITE[key]=SITE[key].filter(x=>x.id!==id); saveSite(); VIEWS.sitecontent(); toast('ลบรายการแล้ว','error'); }
function addGallery(){ const img=document.getElementById('glImg').value.trim()||(210+SITE.gallery.length); SITE.gallery.push({id:'g'+Date.now(),img:imgVal(String(img)),caption:document.getElementById('glCap').value.trim()||'ภาพกิจกรรม'}); saveSite(); VIEWS.sitecontent(); toast('เพิ่มรูปแล้ว','success'); }
function addVideo(){ const t=document.getElementById('vdTitle').value.trim(); if(!t){toast('กรอกชื่อวิดีโอ','error');return;} SITE.videos.push({id:'v'+Date.now(),title:t,thumb:imgVal(document.getElementById('vdThumb').value.trim()||String(200+SITE.videos.length)),duration:document.getElementById('vdDur').value.trim()||'0:00',url:'#'}); saveSite(); VIEWS.sitecontent(); toast('เพิ่มวิดีโอแล้ว','success'); }
function addBenefit(){ const t=document.getElementById('bfTitle').value.trim(); if(!t){toast('กรอกหัวข้อ','error');return;} SITE.benefits.push({id:'b'+Date.now(),icon:'star',title:t,desc:document.getElementById('bfDesc').value.trim()||''}); saveSite(); VIEWS.sitecontent(); toast('เพิ่มสิทธิพิเศษแล้ว','success'); }
function addOutstanding(){ const n=document.getElementById('osName').value.trim(); if(!n){toast('เลือกจากฐานข้อมูล หรือกรอกชื่อเอง','error');return;} const ph=(document.getElementById('osPhoto').value||'').trim()||String(1+(SITE.outstanding.length*13)%70); SITE.outstanding.push({id:'o'+Date.now(),name:n,field:document.getElementById('osField').value.trim()||'ศิษย์เก่าดีเด่น',photo:imgVal(ph),desc:document.getElementById('osDesc').value.trim()||''}); saveSite(); VIEWS.sitecontent(); toast('เพิ่มศิษย์เก่าดีเด่นแล้ว','success'); }

/* ───────── PAYMENT QUEUE (Phase 1) ───────── */
let payFilter = 'pending';
VIEWS.payments = function(){
  const pending = PAYMENTS.filter(p=>p.status==='pending').length;
  const approved = PAYMENTS.filter(p=>p.status==='approved').length;
  const rejected = PAYMENTS.filter(p=>p.status==='rejected').length;
  document.getElementById('content').innerHTML = `
    <div class="page-head"><h3>Payment Queue — ตรวจสอบการชำระเงิน</h3><p>ตรวจสลิปค่าสมาชิก อนุมัติ/ปฏิเสธ และออกเลขสมาชิกอัตโนมัติ (เชื่อม VerifySlip API)</p></div>
    <div class="grid-stats mb-4">
      ${statCard('card','รออนุมัติ', pending, 'ต้องตรวจสอบ','down')}
      ${statCard('check','อนุมัติแล้ว', approved, 'ออกเลขสมาชิกแล้ว','up')}
      ${statCard('x','ปฏิเสธ', rejected, 'ยอด/หลักฐานไม่ผ่าน','down')}
    </div>
    <div class="ds-card"><div class="ds-card-content">
      <div class="ds-tab-list mb-3">
        ${[['pending','รออนุมัติ'],['approved','อนุมัติแล้ว'],['rejected','ปฏิเสธ'],['all','ทั้งหมด']].map(t=>`<button class="ds-tab ${payFilter===t[0]?'active':''}" onclick="payFilter='${t[0]}';renderPayments()">${t[1]}</button>`).join('')}
      </div>
      <div id="payTableWrap"></div>
    </div></div>`;
  renderPayments();
  animateCharts(document.getElementById('content'));
};
function renderPayments(){
  const rows = PAYMENTS.filter(p=> payFilter==='all' ? true : p.status===payFilter);
  const statusBadge = s => s==='approved'?'<span class="badge badge-success">อนุมัติแล้ว</span>':s==='rejected'?'<span class="badge badge-destructive">ปฏิเสธ</span>':'<span class="badge badge-warning">รออนุมัติ</span>';
  document.getElementById('payTableWrap').innerHTML = `
    <div class="ds-table-wrap"><table class="ds-table">
      <thead><tr><th>ผู้สมัคร</th><th>ยอดโอน</th><th>วันที่</th><th>ติดต่อ</th><th>VerifySlip</th><th>สถานะ</th><th>เลขสมาชิก</th><th></th></tr></thead>
      <tbody>
        ${rows.length===0?`<tr><td colspan="8" class="text-center muted" style="padding:2rem">ไม่มีรายการ</td></tr>`:
        rows.map(p=>`<tr>
          <td><div class="flex items-center gap-2">${avatarOf(p,'md')}<div><div style="font-weight:500">${p.first} ${p.last}</div><div class="type-caption">${p.alumniId} · ${p.faculty} · รุ่น ${p.year}</div></div></div></td>
          <td style="font-weight:600">${p.amount.toLocaleString()} ฿</td>
          <td class="muted">${p.date}</td>
          <td>${contactCell(p)}</td>
          <td><span class="badge ${VERIFY_BADGE[p.verify]}">${VERIFY_LABEL[p.verify]}</span></td>
          <td>${statusBadge(p.status)}</td>
          <td class="type-caption">${p.memberNo||'—'}</td>
          <td><button class="btn btn-outline btn-sm" onclick="openSlip('${p.id}')">${icon('search',14)} ตรวจสลิป</button></td>
        </tr>`).join('')}
      </tbody>
    </table></div>`;
}
/* ── Contact info ของเจ้าของสลิป (เบอร์ + สถานะ LINE) ── */
function lineStatusBadge(linked){ return linked ? '<span class="badge badge-success">LINE: เชื่อมแล้ว</span>' : '<span class="badge badge-warning">ไม่มี LINE</span>'; }
function contactCell(p){
  return `<div class="type-caption" style="white-space:nowrap">${icon('phone',12)} ${p.phone||'—'}</div><div class="mt-1">${lineStatusBadge(p.linked)}</div>`;
}
function contactBlock(p){
  return `<div class="ds-card ds-card-sm mt-3" style="${p.linked?'':'border-color:var(--destructive)'}"><div class="ds-card-content" style="padding:.6rem .85rem">
    <div class="flex justify-between items-center"><span class="type-caption">ติดต่อเจ้าของสลิป</span>${lineStatusBadge(p.linked)}</div>
    <div class="flex items-center gap-2 mt-1">${icon('phone',14)}<span style="font-weight:600">${p.phone||'—'}</span></div>
    <div class="type-caption mt-1" ${p.linked?'':'style="color:var(--destructive)"'}>${p.linked?'มี LINE — ระบบจะส่งแจ้งเตือนผลอัตโนมัติเมื่อปฏิเสธ':'ไม่มี LINE — ต้องโทรแจ้งผลด้วยตนเองนอกระบบ'}</div>
  </div></div>`;
}
/* เหตุผลปฏิเสธสำเร็จรูป (เลือกเป็นหลัก) + ปุ่ม "อื่น ๆ" พิมพ์เอง */
const REJECT_REASONS = ['ยอดโอนไม่ตรงกับยอดที่ต้องชำระ','สลิปไม่ชัด / อ่านไม่ออก','โอนผิดบัญชี','สลิปซ้ำ / เคยใช้แล้ว','ข้อมูลผู้โอนไม่ตรงกับผู้สมัคร','เลยกำหนดชำระ'];
function setReason(btn, text){
  const wrap = btn.parentElement;
  wrap.querySelectorAll('button').forEach(b=>{ b.classList.remove('btn-default'); b.classList.add('btn-outline'); });
  btn.classList.remove('btn-outline'); btn.classList.add('btn-default');
  const el = document.getElementById('rejectNote'); if(el){ el.value = text; el.readOnly = true; }
}
function reasonOther(btn){
  const wrap = btn.parentElement;
  wrap.querySelectorAll('button').forEach(b=>{ b.classList.remove('btn-default'); b.classList.add('btn-outline'); });
  btn.classList.remove('btn-outline'); btn.classList.add('btn-default');
  const el = document.getElementById('rejectNote'); if(el){ el.readOnly = false; el.value=''; el.focus(); }
}
/* แผงกรอกหมายเหตุ (บังคับก่อนปฏิเสธ) + แสดงเหตุผลเดิมถ้าปฏิเสธแล้ว */
function rejectNoteBlock(p){
  if(p.status==='pending') return `<div class="form-group mt-3"><label class="ds-label">หมายเหตุ / เหตุผล <span class="req">*</span> <span class="type-caption">(เลือกเหตุผล หรือกด “อื่น ๆ” เพื่อพิมพ์เอง · ใช้ส่ง LINE และอ้างอิงตอนโทร)</span></label>
    <div class="flex gap-2 mb-2" style="flex-wrap:wrap">
      ${REJECT_REASONS.map(r=>`<button type="button" class="btn btn-outline btn-sm" onclick="setReason(this,'${r.replace(/'/g,"\\'")}')">${r}</button>`).join('')}
      <button type="button" class="btn btn-outline btn-sm" onclick="reasonOther(this)">${icon('edit',13)} อื่น ๆ (ระบุเอง)</button>
    </div>
    <textarea class="ds-textarea" id="rejectNote" rows="2" readonly placeholder="เลือกเหตุผลด้านบน หรือกด “อื่น ๆ” เพื่อพิมพ์เอง"></textarea></div>`;
  if(p.status==='rejected' && p.rejectNote) return `<div class="ds-alert ds-alert-warning mt-3"><span class="ds-alert-icon">${icon('bell',16)}</span><div><strong>เหตุผลที่ปฏิเสธ:</strong> ${escHtml(p.rejectNote)}<br>${p.linked?'· แจ้งผ่าน LINE ให้ผู้สมัครแล้ว':'· ไม่มี LINE — ติดต่อทางโทรศัพท์ '+(p.phone||'—')}</div></div>`;
  return '';
}
/* ปฏิเสธพร้อมหมายเหตุ → มี LINE: ส่งแจ้งเตือนอัตโนมัติ · ไม่มี LINE: ให้แอดมินโทรเอง */
function doReject(p, viewName){
  const note = (document.getElementById('rejectNote')?.value||'').trim();
  if(!note){ toast('กรุณากรอกหมายเหตุ/เหตุผลก่อนปฏิเสธ','warning'); const el=document.getElementById('rejectNote'); if(el) el.focus(); return false; }
  p.status='rejected'; p.rejectNote=note;
  closeOverlay(); if(current===viewName){ VIEWS[viewName](); }
  if(p.linked){ toast('ปฏิเสธแล้ว · ส่ง LINE แจ้ง '+p.first+' พร้อมเหตุผลอัตโนมัติ','success'); }
  else { toast('ปฏิเสธแล้ว · ไม่มี LINE — โปรดโทรหา '+(p.phone||'—')+' เพื่อแจ้งเหตุผล','error'); }
  return true;
}
function slipMock(p){

/* Shell โมดัลตรวจสลิป — ใช้ร่วมกันทั้ง Membership & Event Queue (หน้าตาเหมือนกัน) */
function verifyRow(p){
  return `<div class="flex items-center justify-between mb-3" style="padding:.55rem .85rem;border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--muted)"><span class="type-body-sm muted">ผลตรวจ VerifySlip API</span><span class="badge ${VERIFY_BADGE[p.verify]}">${VERIFY_LABEL[p.verify]}</span></div>`;
}
function slipModal(p, o){
  openModal(`<div class="ds-modal" style="max-width:780px">
    <div class="ds-modal-header"><span class="ds-modal-title">${o.title}</span><button class="btn btn-ghost btn-icon" onclick="closeOverlay()">${icon('x',18)}</button></div>
    <div class="ds-modal-body">
      <div style="display:flex;gap:1.75rem;flex-wrap:wrap;align-items:flex-start">
        <div style="flex-shrink:0;margin:0 auto">${slipMock(p)}</div>
        <div style="flex:1;min-width:290px">
          <div class="flex items-center gap-3 mb-3">${avatarOf(p,'lg')}<div><div class="type-h5" style="line-height:1.3">${escHtml(p.first+' '+p.last)}</div><div class="type-caption">${o.sub}</div></div></div>
          ${o.summaryHTML}
          ${verifyRow(p)}
          ${o.alertsHTML}
          ${contactBlock(p)}
          ${rejectNoteBlock(p)}
        </div>
      </div>
    </div>
    <div class="ds-modal-footer">${o.footerHTML}</div>
  </div>`);
}
function openSlip(id){
  const p = PAYMENTS.find(x=>x.id===id);
  const fallback = p.verify==='error';
  const diff = p.amount !== MEMBER_FEE;
  const summary = `<div class="ds-card ds-card-sm mb-3"><div class="ds-card-content" style="padding:.85rem 1rem">
    <div class="type-overline muted mb-2">ยอดชำระค่าสมาชิก</div>
    <div class="flex justify-between items-center"><span class="type-body-sm muted">ยอดที่ต้องชำระ</span><span style="font-weight:600">${MEMBER_FEE.toLocaleString()} ฿</span></div>
    <div class="ds-separator" style="margin:.55rem 0"></div>
    <div class="flex justify-between items-center"><span class="type-body-sm muted">ยอดในสลิป</span><span style="font-weight:800;font-size:1.3rem;color:${diff?'var(--destructive)':'oklch(0.45 0.18 145)'}">${p.amount.toLocaleString()} ฿ ${diff?'⚠':'✓'}</span></div>
  </div></div>`;
  const alerts = `${fallback?`<div class="ds-alert ds-alert-error mb-3"><span class="ds-alert-icon">${icon('bell',16)}</span><div><strong>ตรวจอัตโนมัติไม่ได้</strong>VerifySlip API ไม่ตอบสนอง กรุณาตรวจสอบสลิปด้วยตนเอง</div></div>`:''}${p.verify==='mismatch'?`<div class="ds-alert ds-alert-warning mb-3"><span class="ds-alert-icon">${icon('bell',16)}</span><div><strong>ยอดไม่ตรง</strong>โอนมา ${p.amount.toLocaleString()} ฿ น้อยกว่าค่าสมาชิก ${MEMBER_FEE.toLocaleString()} ฿ (ขาด ${(MEMBER_FEE-p.amount).toLocaleString()} ฿)</div></div>`:''}${p.verify==='matched'&&p.status==='pending'?`<div class="ds-alert ds-alert-success mb-3"><span class="ds-alert-icon">${icon('check',16)}</span><div>ยอดและบัญชีผู้รับถูกต้อง พร้อมอนุมัติ</div></div>`:''}${p.status==='approved'?`<div class="ds-alert ds-alert-success mb-3"><span class="ds-alert-icon">${icon('check',16)}</span><div><strong>อนุมัติแล้ว</strong>เลขสมาชิก ${p.memberNo}</div></div>`:''}`;
  const footer = p.status==='pending'
    ? `<button class="btn btn-destructive btn-md" onclick="rejectPay('${p.id}')">${icon('x',16)} ปฏิเสธ</button><button class="btn btn-default btn-md" onclick="approvePay('${p.id}')">${icon('check',16)} อนุมัติ & ออกเลขสมาชิก</button>`
    : `<button class="btn btn-secondary btn-md" onclick="closeOverlay()">ปิด</button>`;
  slipModal(p, { title:'ตรวจสอบสลิปการชำระเงิน', sub:`${p.alumniId} · ${escHtml(p.faculty)} · รุ่น ${p.year}`, summaryHTML:summary, alertsHTML:alerts, footerHTML:footer });
}

function openEventSlip(id){
  const p = EVENT_PAYMENTS.find(x=>x.id===id);
  const e = EVENTS.find(x=>x.id===p.eventId);
  const t = e && e.tickets.find(x=>x.name===p.ticketName);
  const unit = t ? ticketPrice(t, p.tier==='member') : null;
  const expected = unit!=null ? unit*p.qty : null;
  const diff = expected!=null && p.amount!==expected;
  const fallback = p.verify==='error';
  const summary = `<div class="ds-card ds-card-sm mb-3"><div class="ds-card-content" style="padding:.85rem 1rem">
    <div class="type-overline muted mb-2">รายการบัตร</div>

    <div class="flex justify-between mt-1 items-center"><span class="type-body-sm muted">ระดับราคา</span><span class="badge ${p.tier==='member'?'badge-success':'badge-ghost'}">${EVENT_TIER_LABEL[p.tier]||'ราคาทั่วไป'}</span></div>
    <div class="ds-separator" style="margin:.55rem 0"></div>
    ${expected!=null?`<div class="flex justify-between items-center"><span class="type-body-sm muted">ยอดที่ต้องชำระ</span><span style="font-weight:600">${expected.toLocaleString()} ฿</span></div>`:''}
    <div class="flex justify-between items-center mt-1"><span class="type-body-sm muted">ยอดในสลิป</span><span style="font-weight:800;font-size:1.3rem;color:${diff?'var(--destructive)':'oklch(0.45 0.18 145)'}">${p.amount.toLocaleString()} ฿ ${diff?'⚠':'✓'}</span></div>
  </div></div>`;
  const alerts = `${fallback?`<div class="ds-alert ds-alert-error mb-3"><span class="ds-alert-icon">${icon('bell',16)}</span><div><strong>ตรวจอัตโนมัติไม่ได้</strong>VerifySlip API ไม่ตอบสนอง กรุณาตรวจสอบด้วยตนเอง</div></div>`:''}${diff&&!fallback?`<div class="ds-alert ds-alert-warning mb-3"><span class="ds-alert-icon">${icon('bell',16)}</span><div><strong>ยอดไม่ตรง</strong>โอนมา ${p.amount.toLocaleString()} ฿ ไม่ตรงกับยอดที่ต้องชำระ ${expected.toLocaleString()} ฿</div></div>`:''}${p.verify==='matched'&&!diff&&p.status==='pending'?`<div class="ds-alert ds-alert-success mb-3"><span class="ds-alert-icon">${icon('check',16)}</span><div>ยอดถูกต้อง พร้อมอนุมัติเพื่อออก E-Ticket</div></div>`:''}${p.status==='approved'?`<div class="ds-alert ds-alert-success mb-3"><span class="ds-alert-icon">${icon('check',16)}</span><div><strong>อนุมัติแล้ว</strong>ออก E-Ticket ให้ผู้ซื้อแล้ว</div></div>`:''}`;
  const footer = p.status==='pending'
    ? `<button class="btn btn-destructive btn-md" onclick="rejectEventPay('${p.id}')">${icon('x',16)} ปฏิเสธ</button><button class="btn btn-default btn-md" onclick="approveEventPay('${p.id}')">${icon('check',16)} อนุมัติ & ออก E-Ticket</button>`
    : `<button class="btn btn-secondary btn-md" onclick="closeOverlay()">ปิด</button>`;
  slipModal(p, { title:'ตรวจสอบสลิปค่าบัตรงาน', sub:`${p.alumniId} · รุ่น ${p.year}`, summaryHTML:summary, alertsHTML:alerts, footerHTML:footer });
}

  closeOverlay(); if(current==='eventpayments'){VIEWS.eventpayments();} toast('อนุมัติแล้ว · ออก E-Ticket ให้ '+p.first+' '+p.last,'success');

function onEventImgFile(input){
  const f = input.files && input.files[0]; if(!f) return;
  if(f.size > 1.5*1024*1024){ toast('ไฟล์ใหญ่เกิน 1.5MB กรุณาเลือกรูปเล็กลง หรือใช้ลิงก์รูป','error'); return; }
  const r = new FileReader();
  r.onload = e => setEventImg(e.target.result);
  r.readAsDataURL(f);
}
function setEventImg(val){
  const hid = document.getElementById('evfImg'); if(hid) hid.value = val;
  const pv = document.getElementById('evfImgPreview'); if(pv) pv.style.backgroundImage = `url('${IMG(val)}')`;

function saveEvent(id){
  const v = s => document.getElementById(s);
  const title = v('evfTitle').value.trim();
  if(!title){ toast('กรุณากรอกชื่องาน','error'); return; }
  let img = v('evfImg').value; if(/^\d+$/.test(img)) img = parseInt(img);
  const ex = id ? EVENTS.find(x=>x.id===id) : null;
  const rows = Array.from(document.querySelectorAll('#evfTickets .evf-ticket')).map((r,i)=>{
    const name = r.querySelector('.evf-tname').value.trim();
    const price = parseInt(r.querySelector('.evf-tprice').value)||0;
    const pmRaw = r.querySelector('.evf-tpricem').value.trim();
    const priceMember = pmRaw===''?null:(parseInt(pmRaw)||0);
    const quota = parseInt(r.querySelector('.evf-tquota').value)||0;
    const exT = ex && ex.tickets[i];
    return { id: exT?exT.id:'T'+(i+1), name: name||('บัตร '+(i+1)), price, priceMember, quota, sold: exT?exT.sold:0 };
  }).filter(t=>t.name||t.quota);
  if(!rows.length) rows.push({id:'T1',name:'บัตรทั่วไป',price:0,priceMember:0,quota:100,sold:0});
  const date = v('evfDate').value || todayTH();
  const data = {
    title, date, dateShort: date.split(' ').slice(0,2),
    time: v('evfTime').value.trim() || '—', place: v('evfPlace').value.trim() || '—',
    mapUrl: v('evfMapUrl').value.trim(),
    img, status: v('evfStatus').value, desc: v('evfDesc').value.trim(), tickets: rows,
  };
  if(ex){ Object.assign(ex, data); }
  else { data.id = 'EV' + String(Date.now()).slice(-6); EVENTS.unshift(data); }
  if(!saveEvents()){ toast('รูปอาจใหญ่เกินไปสำหรับพื้นที่จัดเก็บ ลองใช้ลิงก์รูปแทน','error'); }
  logAction(id?'แก้ไข Event':'สร้าง Event', data.id + ' · ' + title);
  closeOverlay();
  VIEWS.events();
  toast(id?'บันทึก Event แล้ว · อัปเดต LIFF':'สร้าง Event แล้ว · แสดงบน LIFF','success');
}
/* รายการจองแบบจำลองผูกกับงาน (deterministic) — มีรุ่น/บัตร/ระดับราคา/สถานะชำระเงิน */
function bookingsFor(e){
  const n = Math.min(12, ALUMNI.length);
  return ALUMNI.slice(0, n).map((a,i)=>{
    const t = e.tickets[i % e.tickets.length];
    const tier = (i%3===0) ? 'general' : 'member';
    const status = (i%4===3) ? 'pending' : 'approved';
    return { name:a.first+' '+a.last, year:a.year, ticketName:t.name, tier, qty:(i%5===0?2:1), status };
  });
}
let bookYear = '';

function renderBookings(id){
  const e = EVENTS.find(x=>x.id===id);
  const rows = bookingsFor(e).filter(b=> bookYear==='' ? true : String(b.year)===String(bookYear));
  const statusBadge = s => s==='approved'?'<span class="badge badge-success">อนุมัติแล้ว</span>':'<span class="badge badge-warning">รออนุมัติ</span>';
  document.getElementById('bookTableWrap').innerHTML = `

      <thead><tr><th>ผู้ลงทะเบียน</th><th>รุ่น</th><th>ประเภทบัตร</th><th>ระดับราคา</th><th>จำนวน</th><th>สถานะ</th></tr></thead>
      <tbody>${rows.length===0?`<tr><td colspan="6" class="text-center muted" style="padding:1.5rem">ไม่มีรายการ</td></tr>`:
        rows.map(b=>`<tr><td>${escHtml(b.name)}</td><td>${b.year}</td><td>${escHtml(b.ticketName)}</td><td><span class="badge ${b.tier==='member'?'badge-success':'badge-ghost'}">${EVENT_TIER_LABEL[b.tier]}</span></td><td>${b.qty}</td><td>${statusBadge(b.status)}</td></tr>`).join('')}
      </tbody>
    </table></div>`;
}
function exportBookings(id){
  const e = EVENTS.find(x=>x.id===id);
  let rows = bookingsFor(e).filter(b=>b.status==='approved');
  if(bookYear!=='') rows = rows.filter(b=>String(b.year)===String(bookYear));
  if(!rows.length){ toast('ไม่มีรายการที่อนุมัติแล้วให้ส่งออก','error'); return; }
  rows.sort((a,b)=> (b.year-a.year) || a.name.localeCompare(b.name,'th'));
  const head = ['ลำดับ','ชื่อ-นามสกุล','รุ่น','ประเภทบัตร','ระดับราคา','จำนวน','สถานะ'];
  const esc = s => '"'+String(s).replace(/"/g,'""')+'"';
  const lines = [head.map(esc).join(',')];
  rows.forEach((b,i)=> lines.push([i+1, b.name, b.year, b.ticketName, EVENT_TIER_LABEL[b.tier], b.qty, 'อนุมัติแล้ว'].map(esc).join(',')));
  const csv = '﻿' + lines.join('\r\n'); // BOM ให้ Excel อ่านภาษาไทยถูก
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'bookings_'+e.id+(bookYear?('_รุ่น'+bookYear):'_ทุกรุ่น')+'.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  logAction('Export รายชื่อผู้จอง', e.id+' · '+rows.length+' รายการ'+(bookYear?(' · รุ่น '+bookYear):''));
  toast('ส่งออก '+rows.length+' รายการ (อนุมัติแล้ว) เป็นไฟล์ Excel','success');
}

/* สลับสิทธิ์ใน matrix (เดโม) */
function togglePerm(ri, roleKey){ if(!PERM_ROWS[ri]) return; PERM_ROWS[ri][roleKey] = PERM_ROWS[ri][roleKey]?0:1; VIEWS.permissions(); }
/* CRUD ผู้ใช้งาน */
function openUserForm(id){
  const u = id ? USERS.find(x=>x.id===id) : null;
  openModal(`<div class="ds-modal" style="max-width:460px">
    <div class="ds-modal-header"><span class="ds-modal-title">${u?'แก้ไขผู้ใช้':'เพิ่มผู้ใช้'}</span><button class="btn btn-ghost btn-icon" onclick="closeOverlay()">${icon('x',18)}</button></div>
    <div class="ds-modal-body">
      <div class="form-group"><label class="ds-label">ชื่อ-นามสกุล <span class="req">*</span></label><input class="ds-input" id="uName" value="${u?escHtml(u.name):''}"></div>
      <div class="form-group"><label class="ds-label">อีเมล <span class="req">*</span></label><input class="ds-input" id="uEmail" value="${u?escHtml(u.email):''}"></div>
      <div class="form-group"><label class="ds-label">สิทธิ์ (Role)</label><select class="ds-select" id="uRole">${PERM_ROLES.map(r=>`<option value="${r.key}" ${u&&u.role===r.key?'selected':''}>${r.label}</option>`).join('')}</select></div>
      <div class="flex items-center justify-between"><div><div style="font-weight:500;font-size:.875rem">เปิดใช้งานบัญชี</div><div class="type-caption">ปิด = ระงับการเข้าใช้งาน</div></div><span class="ds-switch ${(!u||u.active)?'on':''}" id="uActive" data-toggle></span></div>
    </div>
    <div class="ds-modal-footer">
      <button class="btn btn-secondary btn-md" onclick="closeOverlay()">ยกเลิก</button>
      <button class="btn btn-default btn-md" onclick="saveUser('${id||''}')">${icon('check',16)} บันทึก</button>
    </div>
  </div>`);
  bindToggles(document.getElementById('overlay'));
}
function saveUser(id){
  const name = (document.getElementById('uName').value||'').trim();
  const email = (document.getElementById('uEmail').value||'').trim();
  if(!name || !email){ toast('กรุณากรอกชื่อและอีเมล','error'); return; }
  const role = document.getElementById('uRole').value;
  const active = document.getElementById('uActive').classList.contains('on');
  if(id){ const u = USERS.find(x=>x.id===id); if(u){ Object.assign(u, {name,email,role,active}); } logAction('แก้ไขผู้ใช้', id+' · '+name); }
  else { const nid = 'U'+String(USER_SEQ++).padStart(2,'0'); USERS.push({ id:nid, name, email, role, active }); logAction('เพิ่มผู้ใช้', nid+' · '+name); }
  closeOverlay(); VIEWS.permissions(); toast(id?'บันทึกผู้ใช้แล้ว':'เพิ่มผู้ใช้แล้ว','success');
}
function deleteUser(id){
  const u = USERS.find(x=>x.id===id); if(!u) return;
  openModal(`<div class="ds-modal" style="max-width:400px">
    <div class="ds-modal-body text-center" style="padding-top:1.5rem">
      <div class="stat-icon" style="margin:0 auto 1rem;width:48px;height:48px;background:oklch(0.6 0.2 25 / .15);color:var(--destructive)">${icon('trash',22)}</div>
      <h3 class="type-h4 mb-2">ลบผู้ใช้?</h3>
      <p class="type-body-sm muted">ลบบัญชี <strong>${escHtml(u.name)}</strong> (${u.id}) ออกจากระบบ</p>
    </div>
    <div class="ds-modal-footer" style="justify-content:center">
      <button class="btn btn-secondary btn-md" onclick="closeOverlay()">ยกเลิก</button>
      <button class="btn btn-destructive btn-md" onclick="confirmDeleteUser('${id}')">${icon('trash',16)} ลบ</button>
    </div>
  </div>`);
}
function confirmDeleteUser(id){
  const i = USERS.findIndex(x=>x.id===id); if(i>-1){ const u=USERS[i]; USERS.splice(i,1); logAction('ลบผู้ใช้', u.id+' · '+u.name); }
  closeOverlay(); VIEWS.permissions(); toast('ลบผู้ใช้แล้ว','success');
}
